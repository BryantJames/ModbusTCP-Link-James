spring:
  datasource:
    url: jdbc:h2:mem:modbus_tcp_controller;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql
      mode: always

# JWT 配置
jwt:
  secret: james-modbus-tcp-secret-key-2026-change-in-production
  expiration: 86400000
  header: Authorization
  prefix: Bearer

# Modbus 默认配置
modbus:
  default-timeout: 1000
  default-retries: 2
  polling:
    enabled: false
    default-scan-rate-ms: 60000

# 跨域配置
cors:
  allowed-origins: "*"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"
  allow-credentials: false
